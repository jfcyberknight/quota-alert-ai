name: CI/CD Deployment

on:
  push:
    branches: [ master, main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Set Vercel env vars
        run: |
          printf "${{ secrets.VAPID_PUBLIC_KEY }}"  | npx vercel env add VAPID_PUBLIC_KEY  production --token=${{ secrets.VERCEL_TOKEN }} --force 2>/dev/null || true
          printf "${{ secrets.VITE_VAPID_PUBLIC_KEY }}" | npx vercel env add VITE_VAPID_PUBLIC_KEY production --token=${{ secrets.VERCEL_TOKEN }} --force 2>/dev/null || true
          printf "${{ secrets.VAPID_PRIVATE_KEY }}" | npx vercel env add VAPID_PRIVATE_KEY production --token=${{ secrets.VERCEL_TOKEN }} --force 2>/dev/null || true
          printf "${{ secrets.CRON_SECRET }}"       | npx vercel env add CRON_SECRET       production --token=${{ secrets.VERCEL_TOKEN }} --force 2>/dev/null || true
          printf "${{ secrets.FIREBASE_SERVICE_ACCOUNT_QUOTA_ALERT_AI_JV }}" | npx vercel env add FIREBASE_SERVICE_ACCOUNT production --token=${{ secrets.VERCEL_TOKEN }} --force 2>/dev/null || true
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        run: npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Verify firebase.json exists
        run: |
          test -f firebase.json || (echo "ERROR: firebase.json is missing - Firebase deploy aborted." && exit 1)

      - name: Deploy Firestore rules
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_QUOTA_ALERT_AI_JV }}' > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json npx firebase deploy --only firestore:rules --project quota-alert-ai-jv --non-interactive
          rm /tmp/sa.json

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_QUOTA_ALERT_AI_JV }}
          projectId: quota-alert-ai-jv
          channelId: live
